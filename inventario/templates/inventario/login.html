<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StockSmart — Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #1C1917;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card {
            background: #292524;
            border-radius: 16px;
            padding: 48px 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
        }
        .logo { font-size: 2.2rem; font-weight: 800; color: #D97706; margin-bottom: 4px; }
        .subtitle { color: #78716C; font-size: 0.9rem; margin-bottom: 32px; }
        label { display: block; font-size: 0.75rem; font-weight: 600; color: #A8A29E; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px; }
        input {
            width: 100%;
            padding: 12px 16px;
            background: #1C1917;
            border: 1px solid #44403C;
            border-radius: 8px;
            color: #F5F5F4;
            font-size: 0.95rem;
            margin-bottom: 20px;
            outline: none;
            transition: border-color 0.2s;
        }
        input:focus { border-color: #D97706; }
        .error {
            background: #FEE2E2;
            color: #DC2626;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 0.85rem;
            margin-bottom: 20px;
        }
        button {
            width: 100%;
            padding: 13px;
            background: #D97706;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover { background: #B45309; }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">StockSmart</div>
        <div class="subtitle">Sistema de reposición de inventario</div>

        {% if form.errors %}
            <div class="error">⚠️ Usuario o contraseña incorrectos.</div>
        {% endif %}

        <form method="post">
            {% csrf_token %}
            <label>Usuario</label>
            <input type="text" name="username" placeholder="tucorreo@negocio.com" autofocus>
            <label>Contraseña</label>
            <input type="password" name="password" placeholder="••••••••">
            <button type="submit">Ingresar al sistema →</button>
        </form>
    </div>
</body>
</html>
