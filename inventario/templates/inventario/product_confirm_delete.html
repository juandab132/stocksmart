<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StockSmart — Eliminar Producto</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #F7F4EF; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .card { background: white; border-radius: 16px; padding: 40px; max-width: 440px; width: 100%; box-shadow: 0 4px 20px rgba(0,0,0,0.08); text-align: center; }
        .icon { font-size: 3rem; margin-bottom: 16px; }
        .title { font-size: 1.3rem; font-weight: 700; color: #1C1917; margin-bottom: 8px; }
        .sub { color: #78716C; font-size: 0.9rem; margin-bottom: 28px; }
        .product-name { font-weight: 700; color: #DC2626; }
        .btn-row { display: flex; gap: 12px; justify-content: center; }
        .btn-danger { background: #DC2626; color: white; border: none; padding: 11px 28px; border-radius: 8px; font-size: 0.95rem; font-weight: 600; cursor: pointer; }
        .btn-danger:hover { background: #B91C1C; }
        .btn-secondary { background: #F7F4EF; color: #1C1917; border: 1px solid #E2DDD6; padding: 11px 28px; border-radius: 8px; font-size: 0.95rem; text-decoration: none; }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">🗑️</div>
        <div class="title">¿Eliminar producto?</div>
        <div class="sub">Estás a punto de eliminar <span class="product-name">{{ product.name }}</span>. Esta acción no se puede deshacer.</div>
        <div class="btn-row">
            <form method="post">
                {% csrf_token %}
                <button type="submit" class="btn-danger">Sí, eliminar</button>
            </form>
            <a href="/productos/" class="btn-secondary">Cancelar</a>
        </div>
    </div>
</body>
</html>
